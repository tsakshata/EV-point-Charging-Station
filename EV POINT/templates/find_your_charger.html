<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Charger</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/static/find-your-charger.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="icon" href="/static/temp/assets/images/icon.ico" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <!-- HEADER SECTION -->
  <header>
    <a href="{{ url_for('home') }}" class="logo">
      <img src="/static/pic/logo.png" alt="logo" />
    </a>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('find_your_charger') }}">Find your charger</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('contact_us') }}">Contact us</a></li>
        <li><a href="{{ url_for('login') }}" class="cta">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <div class="container">
      <h1>Find Your Charge Point</h1>
      <form id="chargerForm">
        <!-- City Dropdown -->
        <label for="city">Select a City:</label>
        <select id="city" name="city" required>
          <option value="" disabled selected>-- Select a city --</option>
          <option value="Bengaluru">Bengaluru</option>
          <option value="Ernakulam">Ernakulam</option>
          <option value="Kozhikode">Kozhikode</option>
        </select>

        <br><br>

        <!-- Charger Type Dropdown -->
        <label for="charge-type">Select Charger Type:</label>
        <select name="charge-type" id="charge-type">
          <option value="" disabled selected>-- Select charger type --</option>
          <option value="ac-l1">AC Level 1 Charging</option>
          <option value="ac-l2">AC Level 2 Charging</option>
          <option value="dc-fast">DC Fast Charging</option>
        </select>

        <br><br>

        <!-- Submit Button -->
        <button type="submit" id="book">
          <i class="fa fa-search" aria-hidden="true"></i> Search
        </button>
      </form>

      <!-- Map Section -->
      <div id="map"></div>
    </div>
  </main>

  <!-- FOOTER SECTION -->
  <footer>
    <div class="footer-content">
      <h3>EV Charger Locator</h3>
      <p>&copy; 2025 EV Charging Station Finder. All rights reserved.</p>
    </div>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const cityLocations = {
      Bengaluru: [
        { lat: 12.9716, lng: 77.5946, name: "Charger 1 - Bengaluru" },
        { lat: 12.9352, lng: 77.6146, name: "Charger 2 - Bengaluru" },
      ],
      Ernakulam: [
        { lat: 9.9816, lng: 76.2999, name: "Charger 1 - Ernakulam" },
      ],
      Kozhikode: [
        { lat: 11.2588, lng: 75.7804, name: "Charger 1 - Kozhikode" },
      ]
    };

    let map = L.map('map').setView([11.0, 76.0], 6); // Default view

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    document.getElementById("chargerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const selectedCity = document.getElementById("city").value;
      const chargers = cityLocations[selectedCity];

      if (!chargers) {
        alert("Please select a city to view available chargers.");
        return;
      }

      // Clear existing markers
      map.eachLayer(function (layer) {
        if (layer instanceof L.Marker) {
          map.removeLayer(layer);
        }
      });

      const bounds = [];

      chargers.forEach((charger) => {
        const marker = L.marker([charger.lat, charger.lng])
          .addTo(map)
          .bindPopup(charger.name);
        bounds.push([charger.lat, charger.lng]);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds);
      }
    });
  </script>
</body>
</html>
