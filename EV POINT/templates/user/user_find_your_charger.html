<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Charger</title>
  <link rel="stylesheet" href="/static/user/find-your-charger.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"/>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.11.4/css/jquery.dataTables.min.css">
  <link rel="icon" href="/static/temp/assets/images/icon.ico"/>
</head>

<body>
  <!-- HEADER SECTION -->
  <header>
    <a href="{{ url_for('home') }}" class="logo" aria-label="EV Charger Home">
      <img src="/static/pic/logo.png" alt="EV Charger Logo">
    </a>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <!-- <li><a href="{{ url_for('user_find_your_charger') }}">Find your charger</a></li> -->
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('contact_us') }}">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN SECTION -->
  <main>
    <div class="container">
      <h1>Find Your Charge Point</h1>
      <form action="{{ url_for('search_stations') }}" method="post">
        <label for="City">Select a City:</label>
        <select id="City" name="City" required>
          <option value="">--Select a City--</option>
          <option value="thiruvananthapuram">Thiruvananthapuram</option>
          <option value="Kollam">Kollam</option>
          <option value="Pathanamthitta">Pathanamthitta</option>
          <option value="Alapuzha">Alapuzha</option>
          <option value="Kottayam">Kottayam</option>
          <option value="Idukki">Idukki</option>
          <option value="Ernakulam">Ernakulam</option>
          <option value="Thrissur">Thrissur</option>
          <option value="Palakkad">Palakkad</option>
          <option value="Malappuram">Malappuram</option>
          <option value="Kozhikode">Kozhikode</option>
          <option value="Wayanad">Wayanad</option>
          <option value="kannur">Kannur</option>
          <option value="Kasaragod">Kasaragod</option>
          <option value="Bengaluru">Bengaluru</option>
          <option value="Mysuru">Mysuru</option>
          <option value="Hubballi">Hubballi</option>
          <option value="Mangaluru">Mangaluru</option>
          <option value="Belagavi">Belagavi</option>
          <option value="Shivamogga">Shivamogga</option>
          <option value="Davanagere">Davanagere</option>
          <option value="Ballari">Ballari</option>
          <option value="Kalaburagi">Kalaburagi</option>
        </select>
        <br><br>

        <label for="Charger_type">Select Charging Type:</label>
        <select name="Charger_type" id="Charger_type" required>
          <option value="">--Select--</option>
          <option value="AC Level 1 Charging">AC Level 1 Charging</option>
          <option value="AC Level 2 Charging">AC Level 2 Charging</option>
          <option value="DC Fast Charging">DC Fast Charging</option>
        </select>
        <br><br>

        <button id="book" type="submit">Search</button>
      </form>
    </div>
  </main>

  <!-- FOOTER SECTION -->
  <footer>
    <div class="footer-content">
      <h3>EV Charging Station Finder</h3>
      <p>&copy; 2025 EV Charging Station Finder. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
